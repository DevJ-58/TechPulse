<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="images/h.png" type="image/png">
<title>Inscription — TechPulse Admin</title>
<link rel="stylesheet" href="admin.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-wrap{width:100%;max-width:400px;}
.login-logo{display:flex;align-items:center;gap:9px;margin-bottom:40px;}
.login-logo img { height: 64px; }
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;}
.login-title{font-family:var(--font-display);font-size:20px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
.login-error{background:var(--danger-bg);border:1px solid rgba(204,34,0,.2);color:var(--danger);padding:11px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;display:none;}
.login-error.show{display:block;}
.login-footer{font-size:11px;color:var(--muted);text-align:center;margin-top:20px;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo"><img src="images/1773340127513.png" alt="TechPulse Logo"> <span style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;">Admin</span></div>
    <div class="login-box">
      <h2 class="login-title">Créer un compte admin</h2>
      <p class="login-sub">Accès réservé à l'équipe fondatrice</p>
      <div class="login-error" id="register-error"></div>
      <form id="register-form">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          <div class="form-group">
            <label class="form-label">Prénom</label>
            <input type="text" class="form-input" id="prenom" placeholder="Prénom *">
          </div>
          <div class="form-group">
            <label class="form-label">Nom</label>
            <input type="text" class="form-input" id="nom" placeholder="Nom *">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email admin</label>
          <input type="email" class="form-input" id="email" placeholder="admin@clubpulse.tech">
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input type="password" class="form-input" id="password" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label class="form-label">Confirmer le mot de passe</label>
          <input type="password" class="form-input" id="confirm-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary w-full" 
          id="register-btn" style="margin-top:8px;">
          Créer le compte
        </button>
        <div class="loading-state" style="display:none">Création…</div>
      </form>
    </div>
  <div class="login-footer">
    Déjà un compte ? <a href="login.html" style="color:var(--accent);text-decoration:none;">Se connecter</a>
  </div>
</div>
<script src="/js/admin/register.js" defer></script>
  <div class="toast" id="toast"></div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      console.log('[debug] DOM prêt');
      console.log('[debug] form ?', !!document.querySelector('#register-form'));
      console.log('[debug] btn ?', !!document.querySelector('#register-btn'));
      
      document.querySelector('#register-btn')?.addEventListener('click', () => {
        console.log('[debug] bouton cliqué ✓');
      });

      document.querySelector('#register-form')?.addEventListener('submit', (e) => {
        console.log('[debug] form submit déclenché ✓');
      });
    });
  </script>
</body>
</html>
