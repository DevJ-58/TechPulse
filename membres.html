<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="topbar-burger" onclick="openSidebar()"><span></span><span></span><span></span></button>
      <h1 class="topbar-title">Membres</h1>
    </div>
    <div class="topbar-actions">
      <span class="tag tag-success">4 admis · 11 places restantes</span>
    </div>
  </header>
  <div class="content">

    <div class="grid-4" style="margin-bottom:18px;" id="membres-stats-loading">
      <div class="loading-state">Chargement des statistiques…</div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
      <div class="filter-bar">
        <button class="filter-btn active">Tous (4)</button>
        <button class="filter-btn">Dev (2)</button>
        <button class="filter-btn">Sécu (1)</button>
        <button class="filter-btn">IoT (1)</button>
      </div>
      <div class="search-box" style="width:200px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Rechercher…">
      </div>
    </div>

    <div class="membres-grid">
      <div id="membres-loading" class="loading-state">Chargement des membres…</div>
      <div id="membres-list"></div>
    </div>

    <!-- FONDATEURS -->
    <div style="margin-top:28px;">
      <div style="font-family:var(--font-display);font-size:14px;font-weight:700;margin-bottom:12px;">Équipe fondatrice</div>
      <div class="membres-grid" id="founders-list"></div>
    </div>

  </div>
</div>

<!-- PANEL MEMBRE -->
<div class="detail-overlay" id="det-overlay" onclick="closePanels()"></div>
<div class="detail-panel" id="det-panel">
  <div class="panel-head"><span class="panel-title" id="p-name">—</span><span class="panel-close" onclick="closePanels()">✕</span></div>
  <div class="panel-body" id="p-body"></div>
  <div class="panel-footer">
    <button class="btn btn-outline" onclick="showToast('Email envoyé ✓')">Envoyer email</button>
    <button class="btn btn-danger btn-sm" onclick="showToast('Membre retiré')">Retirer du club</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script type="module" src="./js/membres.js"></script>
