<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="topbar-burger" id="topbar-burger"><span></span><span></span><span></span></button>
      <h1 class="topbar-title">Annonces</h1>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-primary btn-sm" onclick="openNewModal()">+ Nouvelle annonce</button>
    </div>
  </header>
  <div class="content">

    <div class="annonces-grid">
      <!-- ANNONCES LIST -->
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
          <div class="filter-bar" id="annonces-filter-status"></div>
          <div class="filter-bar" id="annonces-filter-pole"></div>
        </div>
        <div id="annonces-loading" class="loading-state">Chargement des annonces…</div>
        <div id="annonces-list"></div>
      </div>

      <!-- COMPOSE SIDEBAR -->
      <div>
        <div class="compose-wrap" id="compose-box">
          <div class="compose-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            Nouvelle annonce
          </div>
          <div class="compose-body">
            <div class="form-group">
              <label class="form-label">Titre</label>
              <input type="text" class="form-input" id="ann-title" placeholder="Titre de l'annonce…">
            </div>
            <div class="date-grid">
              <div class="form-group">
                <label class="form-label">Destinataires</label>
                <select class="form-input form-select" id="ann-dest">
                  <option>Tous les membres</option>
                  <option>Pôle Dev uniquement</option>
                  <option>Pôle Sécu uniquement</option>
                  <option>Pôle IoT uniquement</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Catégorie</label>
                <select class="form-input form-select">
                  <option>Général</option>
                  <option>Événement</option>
                  <option>Workshop</option>
                  <option>Important</option>
                </select>
              </div>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Contenu</label>
              <div style="border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;">
                <div class="editor-toolbar">
                  <button class="editor-btn" title="Gras"><b>B</b></button>
                  <button class="editor-btn" title="Italique"><i>I</i></button>
                  <button class="editor-btn" title="Souligné"><u>U</u></button>
                  <span class="editor-sep"></span>
                  <button class="editor-btn" title="Liste">≡</button>
                  <button class="editor-btn" title="Lien">🔗</button>
                </div>
                <div class="editor-area" contenteditable="true" id="ann-content" data-placeholder="Rédige ton annonce ici…"></div>
              </div>
            </div>
          </div>
          <div class="compose-footer">
            <button class="btn btn-ghost btn-sm" id="save-draft-btn">Sauver brouillon</button>
            <button class="btn btn-primary btn-sm" id="publish-new-btn">Publier & envoyer</button>
          </div>
        </div>
      </div>
    </div>

  </div>

<div class="toast" id="toast"></div>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // Burger menu functionality for admin
  const burger = document.querySelector('#topbar-burger');
  const sidebar = document.querySelector('#sidebar');
  const overlay = document.querySelector('.sidebar-overlay');

  if (burger && sidebar) {
    burger.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      if (overlay) overlay.classList.toggle('show');
    });
  }

  if (overlay) {
    overlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('show');
    });
  }
});
</script>
<script type="module" src="/js/admin/annonces.js"></script>

<!-- MODAL PROFIL ADMIN -->
<div class="modal-overlay" id="profil-modal" style="display:none;">
  <div class="modal" style="max-width:420px;">
    <div class="modal-header">
      <h3 class="modal-title">Mon profil</h3>
      <span class="modal-close" onclick="closeModal('profil-modal')">✕</span>
    </div>
    <div class="modal-body" style="padding:20px;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:20px;">
        <div id="profil-avatar-wrap" style="position:relative;cursor:pointer;" onclick="qs('#profil-photo-input').click()">
          <div id="profil-avatar-display" style="width:72px;height:72px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;overflow:hidden;">A</div>
          <div style="position:absolute;bottom:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;">✏️</div>
        </div>
        <input type="file" id="profil-photo-input" accept="image/*" style="display:none;" onchange="handlePhotoChange(this)">
        <span style="font-size:11px;color:var(--muted);">Clique sur l'avatar pour changer la photo</span>
      </div>
      <div class="filter-bar" style="margin-bottom:16px;">
        <button type="button" class="filter-btn active" onclick="switchProfilTab(this,'infos')">Informations</button>
        <button type="button" class="filter-btn" onclick="switchProfilTab(this,'password')">Mot de passe</button>
      </div>
      <div id="tab-infos">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group"><label class="form-label">Prénom</label><input type="text" class="form-input" id="profil-prenom"></div>
          <div class="form-group"><label class="form-label">Nom</label><input type="text" class="form-input" id="profil-nom"></div>
        </div>
        <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="profil-email"></div>
        <button type="button" class="btn btn-primary w-full" id="save-profil-btn" onclick="saveProfil()">Sauvegarder les modifications</button>
      </div>
      <div id="tab-password" style="display:none;">
        <div class="form-group"><label class="form-label">Mot de passe actuel</label><input type="password" class="form-input" id="profil-pwd-current" placeholder="Mot de passe actuel"></div>
        <div class="form-group"><label class="form-label">Nouveau mot de passe</label><input type="password" class="form-input" id="profil-pwd-new" placeholder="Nouveau mot de passe (min. 8 car.)"></div>
        <div class="form-group"><label class="form-label">Confirmer</label><input type="password" class="form-input" id="profil-pwd-confirm" placeholder="Confirmer le nouveau mot de passe"></div>
        <button type="button" class="btn btn-primary w-full" onclick="savePassword()">Changer le mot de passe</button>
      </div>
      <hr style="border:none;border-top:1px solid var(--border);margin:16px 0;">
      <button type="button" class="btn btn-outline w-full" style="color:var(--danger);border-color:var(--danger);" onclick="doLogout()">Se déconnecter</button>
    </div>
  </div>
</div>
