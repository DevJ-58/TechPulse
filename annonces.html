<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="topbar-burger" onclick="openSidebar()"><span></span><span></span><span></span></button>
      <h1 class="topbar-title">Annonces</h1>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-primary btn-sm" onclick="openNewModal()">+ Nouvelle annonce</button>
    </div>
  </header>
  <div class="content">

    <div class="annonces-grid">
      <!-- ANNONCES LIST -->
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
          <div class="filter-bar" id="annonces-filter-status"></div>
          <div class="filter-bar" id="annonces-filter-pole"></div>
        </div>
        <div id="annonces-loading" class="loading-state">Chargement des annonces…</div>
        <div id="annonces-list"></div>
      </div>

      <!-- COMPOSE SIDEBAR -->
      <div>
        <div class="compose-wrap" id="compose-box">
          <div class="compose-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            Nouvelle annonce
          </div>
          <div class="compose-body">
            <div class="form-group">
              <label class="form-label">Titre</label>
              <input type="text" class="form-input" id="ann-title" placeholder="Titre de l'annonce…">
            </div>
            <div class="date-grid">
              <div class="form-group">
                <label class="form-label">Destinataires</label>
                <select class="form-input form-select" id="ann-dest">
                  <option>Tous les membres</option>
                  <option>Pôle Dev uniquement</option>
                  <option>Pôle Sécu uniquement</option>
                  <option>Pôle IoT uniquement</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Catégorie</label>
                <select class="form-input form-select">
                  <option>Général</option>
                  <option>Événement</option>
                  <option>Workshop</option>
                  <option>Important</option>
                </select>
              </div>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Contenu</label>
              <div style="border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;">
                <div class="editor-toolbar">
                  <button class="editor-btn" title="Gras"><b>B</b></button>
                  <button class="editor-btn" title="Italique"><i>I</i></button>
                  <button class="editor-btn" title="Souligné"><u>U</u></button>
                  <span class="editor-sep"></span>
                  <button class="editor-btn" title="Liste">≡</button>
                  <button class="editor-btn" title="Lien">🔗</button>
                </div>
                <div class="editor-area" contenteditable="true" id="ann-content" data-placeholder="Rédige ton annonce ici…"></div>
              </div>
            </div>
          </div>
          <div class="compose-footer">
            <button class="btn btn-ghost btn-sm" id="save-draft-btn">Sauver brouillon</button>
            <button class="btn btn-primary btn-sm" id="publish-new-btn">Publier & envoyer</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>
<script type="module" src="./js/annonces.js"></script>
</body>
</html>
